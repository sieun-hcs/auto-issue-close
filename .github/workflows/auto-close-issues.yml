
name: Auto Close Labeled Issues
on:
  issues:
    types: [opened, labeled]
jobs:
  auto-close:
    runs-on: ubuntu-latest
    steps:
      - name: Check for 'completed' or 'wontfix' label and close issue
        uses: actions/github-script@v6
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => label.name);
            if (labels.includes('completed') || labels.includes('wontfix')) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              console.log(`Issue #${issue.number} closed because it has one of the target labels.`);
            }
