
name: Auto Close Labeled Issues
on:
  issues:
    types: [labeled]
jobs:
  close-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Close issue
        if: github.event.label.name == 'completed' || github.event.label.name == 'wontfix'
        uses: actions/stale@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "This issue was automatically closed because it has been labeled as 'completed' or 'wontfix'."
          days-before-stale: -1
          days-before-close: -1
          stale-issue-label: "stale"
          exempt-issue-labels: ""
          close-issue-reason: "completed"
